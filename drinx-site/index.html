<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DRINX | Cardápio Digital</title>
  <meta name="description" content="Cardápio digital da DRINX. Acesso rápido a produtos e combos." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="store-strip">
    <div class="container">
      <span class="status-dot" aria-hidden="true"></span>
      <span>Cardápio DRINX • Grande Colorado/Sobradinho-DF</span>
    </div>
  </div>

  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="./index.html">
        <img src="./assets/logo-placeholder.svg" alt="DRINX" class="logo" />
        <div class="brand-text">
          <strong>DRINX</strong>
          <small>Menu digital</small>
        </div>
      </a>

      <nav class="nav">
        <a href="./index.html" class="active">Início</a>
        <a href="./catalogo.html">Produtos</a>
        <a href="./combos.html">Combos</a>
        <a href="./admin.html" class="nav-admin">ADMIN</a>
      </nav>

      <a class="btn btn-primary" target="_blank" rel="noopener" href="https://wa.me/5561996404046">
        Pedir no WhatsApp
      </a>
    </div>
  </header>

  <main class="main">
    <section class="container">
      <div class="banner">
        <h1>Escolha uma opção</h1>
        <p>Acesse o catálogo completo de produtos ou vá direto para os combos.</p>

        <div class="banner-actions">
          <a class="btn btn-primary" href="./catalogo.html">Ver produtos</a>
          <a class="btn btn-soft" href="./combos.html">Ver combos</a>
          <a class="btn btn-soft" target="_blank" rel="noopener" href="https://instagram.com/drinx_distribuidora">
            Instagram
          </a>
        </div>
      </div>
    </section>
  </main>

  <div class="hours-corner" aria-label="Horário de funcionamento">
    Terça a domingo • 13h às 00h
  </div>

  <button class="theme-toggle" type="button" data-theme-toggle aria-label="Alternar tema" title="Ativar tema escuro">
    ☾
  </button>

  <script src="./theme.js"></script>
</body>
</html>
